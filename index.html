<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MESCE · Santuário Nossa Senhora da Saúde</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#6B1F2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MESCE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase (Firestore) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --pergaminho: #F7F1E3;
    --pergaminho-alt: #EFE6D0;
    --tinta: #2B2118;
    --tinta-suave: #6B5D4C;
    --dourado: #B8892B;
    --dourado-escuro: #8C6A1F;
    --vinho: #6B1F2A;
    --verde: #2F5233;
    --roxo: #4B2E5C;
    --rosa: #C97B94;
    --linha: #DCCFAF;
    --branco-card: #FFFDF7;
    --sombra: 0 2px 10px rgba(43,33,24,0.08);
    --radius: 14px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--pergaminho);
    color:var(--tinta);
    font-family:'Source Sans 3', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:84px;
    min-height:100vh;
  }
  h1,h2,h3,.serif{
    font-family:'Cormorant Garamond', Georgia, serif;
    letter-spacing:0.01em;
  }
  a{ color:var(--vinho); }

  /* ---------- Header ---------- */
  header.top{
    background:linear-gradient(180deg, var(--vinho) 0%, #591723 100%);
    color:var(--pergaminho);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:160px; height:160px;
    border:1px solid rgba(247,241,227,0.18);
    border-radius:50%;
  }
  header.top .seal{
    width:38px; height:38px;
    border:1.5px solid var(--dourado);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--dourado);
    font-size:20px;
    margin-bottom:10px;
  }
  header.top h1{
    font-size:26px;
    margin:0 0 2px;
    font-weight:600;
    color:#fff;
  }
  header.top .sub{
    font-size:13.5px;
    color:#E8D9C2;
    margin:0;
  }
  header.top .today{
    margin-top:14px;
    font-size:12.5px;
    color:var(--dourado);
    text-transform:uppercase;
    letter-spacing:0.09em;
    font-weight:600;
  }

  main{ max-width:640px; margin:0 auto; padding:18px 16px 8px; }

  .tab-panel{ display:none; animation:fade .25s ease; }
  .tab-panel.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }

  section.block-title{
    display:flex; align-items:baseline; justify-content:space-between;
    margin: 6px 2px 12px;
  }
  section.block-title h2{
    font-size:21px; margin:0; font-weight:600;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--branco-card);
    border:1px solid var(--linha);
    border-radius:var(--radius);
    box-shadow:var(--sombra);
    padding:14px 16px;
    margin-bottom:12px;
  }

  .preset-buttons{
    display:flex; flex-direction:column; gap:8px;
    margin-bottom:18px;
  }
  .preset-btn{ width:100%; text-align:center; }

  /* ---------- Tarefas ---------- */
  .task-form{
    display:flex; flex-direction:column; gap:8px;
    margin-bottom:16px;
  }
  input[type=text], textarea, select, input[type=date]{
    font-family:inherit;
    font-size:15px;
    padding:10px 12px;
    border:1px solid var(--linha);
    border-radius:10px;
    background:#fff;
    color:var(--tinta);
    width:100%;
  }
  textarea{ resize:vertical; min-height:52px; }
  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; }
  .btn{
    font-family:inherit;
    font-weight:600;
    font-size:14.5px;
    border:none;
    border-radius:10px;
    padding:11px 16px;
    cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--vinho); color:#fff; }
  .btn-outline{ background:transparent; border:1px solid var(--vinho); color:var(--vinho); }
  .btn-ghost{ background:transparent; color:var(--tinta-suave); font-size:13px; padding:6px 8px; }
  .btn-small{ padding:7px 10px; font-size:13px; }
  .file-label{
    display:inline-flex; align-items:center; gap:6px;
    font-size:13.5px; color:var(--tinta-suave);
    border:1px dashed var(--linha);
    border-radius:10px; padding:9px 12px;
    cursor:pointer;
  }
  .file-label input{ display:none; }

  .task-item{
    display:flex; gap:12px; align-items:flex-start;
  }
  .task-check{
    width:24px; height:24px; min-width:24px;
    border:2px solid var(--dourado-escuro);
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; margin-top:2px;
    color:#fff; font-size:14px;
  }
  .task-check.done{ background:var(--verde); border-color:var(--verde); }
  .task-body{ flex:1; min-width:0; }
  .task-title{ font-weight:600; font-size:15.5px; margin:0 0 2px; }
  .task-title.done{ text-decoration:line-through; color:var(--tinta-suave); }
  .task-note{ font-size:13.5px; color:var(--tinta-suave); margin:0 0 8px; white-space:pre-wrap; }
  .task-photo{ max-width:100%; border-radius:10px; margin-bottom:8px; display:block; }
  .task-actions{ display:flex; gap:14px; }
  .task-actions button{ background:none; border:none; padding:0; font-size:12.5px; color:var(--tinta-suave); cursor:pointer; text-decoration:underline; }
  .empty{
    text-align:center; color:var(--tinta-suave); font-size:14px;
    padding:30px 10px;
  }

  /* ---------- Glossário ---------- */
  .gloss-tabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px;
    -webkit-overflow-scrolling:touch;
  }
  .gloss-tabs button{
    white-space:nowrap;
    font-family:inherit; font-size:13.5px; font-weight:600;
    padding:8px 13px; border-radius:999px;
    border:1px solid var(--linha);
    background:#fff; color:var(--tinta-suave);
    cursor:pointer;
  }
  .gloss-tabs button.active{
    background:var(--vinho); color:#fff; border-color:var(--vinho);
  }
  .search-box{ margin-bottom:14px; }
  .gloss-item{ margin-bottom:10px; }
  .gloss-item .icon{
    width:34px; height:34px; border-radius:50%;
    background:var(--pergaminho-alt); color:var(--dourado-escuro);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; margin-bottom:8px;
  }
  .gloss-item .foto{
    width:100%; max-height:220px; object-fit:contain;
    background:var(--pergaminho-alt);
    border-radius:10px; margin-bottom:10px;
    display:block;
  }
  .gloss-item h3{ font-size:17px; margin:0 0 4px; font-weight:600; }
  .gloss-item p{ font-size:14px; margin:0; color:#4a3c2c; line-height:1.5; }
  .color-dot{ width:14px; height:14px; border-radius:50%; display:inline-block; margin-right:8px; border:1px solid rgba(0,0,0,0.15); vertical-align:-1px; }

  /* ---------- Calendário ---------- */
  .cal-item{ display:flex; gap:12px; align-items:flex-start; }
  .cal-date{
    min-width:52px; text-align:center;
    background:var(--pergaminho-alt); border-radius:10px; padding:6px 4px;
  }
  .cal-date .d{ font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; line-height:1; }
  .cal-date .m{ font-size:10.5px; text-transform:uppercase; color:var(--tinta-suave); letter-spacing:0.05em; }
  .cal-body{ flex:1; }
  .cal-body h3{ font-size:15.5px; margin:0 0 3px; font-weight:600; }
  .cal-body .tag{ font-size:12px; color:var(--tinta-suave); }

  /* ---------- Vídeos ---------- */
  .video-item{ display:flex; gap:12px; align-items:center; }
  .video-thumb{ width:96px; height:64px; border-radius:8px; object-fit:cover; background:var(--pergaminho-alt); flex-shrink:0; }
  .video-item h3{ font-size:14.5px; margin:0 0 4px; font-weight:600; }
  .video-item a{ font-size:12.5px; text-decoration:none; }

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--branco-card);
    border-top:1px solid var(--linha);
    display:flex;
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    z-index:50;
  }
  nav.bottom button{
    flex:1; background:none; border:none;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-family:inherit; font-size:11px; font-weight:600;
    color:var(--tinta-suave); padding:6px 2px;
    cursor:pointer;
  }
  nav.bottom button .ic{ font-size:20px; }
  nav.bottom button.active{ color:var(--vinho); }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(43,33,24,0.5);
    display:none; align-items:flex-end; justify-content:center; z-index:100;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background:var(--pergaminho); width:100%; max-width:640px;
    border-radius:18px 18px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:85vh; overflow-y:auto;
  }
  .modal h2{ margin:0 0 14px; font-size:20px; }

  .sync-banner{
    font-size:12px; text-align:center; padding:7px; color:var(--tinta-suave);
    background:var(--pergaminho-alt); border-radius:10px; margin-bottom:14px;
  }
  .sync-banner.err{ color:#7a1c1c; background:#f6dede; }

  :focus-visible{ outline:2px solid var(--dourado-escuro); outline-offset:2px; }
</style>
</head>
<body>

<header class="top">
  <div class="seal">✝</div>
  <h1>MESCE</h1>
  <p class="sub">Santuário Nossa Senhora da Saúde · Arquidiocese de Brasília</p>
  <p class="today" id="today-label"></p>
</header>

<main>

  <div id="sync-status" class="sync-banner" style="display:none;"></div>

  <!-- TAREFAS -->
  <div class="tab-panel active" id="panel-tarefas">
    <section class="block-title"><h2>Lembretes</h2></section>

    <h3 style="font-size:16px;margin:4px 2px 8px;">Sequências guiadas</h3>
    <div class="preset-buttons">
      <button class="btn btn-outline preset-btn" id="preset-calice">🍷 Preparação do Cálice</button>
      <button class="btn btn-outline preset-btn" id="preset-consagracao">⛪ Momento da Consagração</button>
    </div>

    <section class="block-title">
      <h3 style="font-size:16px;margin:0;">Minhas anotações</h3>
      <button class="btn btn-primary btn-small" id="task-add-btn">+ Nova anotação</button>
    </section>

    <div id="tasks-list"></div>
  </div>

  <!-- GLOSSÁRIO -->
  <div class="tab-panel" id="panel-glossario">
    <section class="block-title"><h2>Glossário Litúrgico</h2></section>
    <input type="text" class="search-box" id="gloss-search" placeholder="Buscar (ex: âmbula, casula...)">
    <div class="gloss-tabs" id="gloss-tabs"></div>
    <div id="gloss-content"></div>
  </div>

  <!-- CALENDÁRIO -->
  <div class="tab-panel" id="panel-calendario">
    <section class="block-title">
      <h2>Calendário Litúrgico</h2>
      <button class="btn btn-outline btn-small" id="cal-add-btn">+ Data</button>
    </section>
    <div id="cal-list"></div>
  </div>

  <!-- VÍDEOS -->
  <div class="tab-panel" id="panel-videos">
    <section class="block-title">
      <h2>Vídeos</h2>
      <button class="btn btn-outline btn-small" id="video-add-btn">+ Link</button>
    </section>
    <div id="video-list"></div>
  </div>

</main>

<nav class="bottom">
  <button class="tab-btn active" data-tab="tarefas"><span class="ic">✅</span>Tarefas</button>
  <button class="tab-btn" data-tab="glossario"><span class="ic">📖</span>Glossário</button>
  <button class="tab-btn" data-tab="calendario"><span class="ic">🗓️</span>Calendário</button>
  <button class="tab-btn" data-tab="videos"><span class="ic">🎥</span>Vídeos</button>
</nav>

<!-- Modal: nova anotação -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal">
    <h2>Nova anotação</h2>
    <form class="task-form" id="task-form">
      <input type="text" id="task-titulo" placeholder="Título (ex: Preparação da patena para batismo)" required>
      <textarea id="task-obs" placeholder="Escreva aqui a sequência de passos que você quer lembrar..." rows="5"></textarea>
      <label class="file-label">
        📷 Adicionar foto
        <input type="file" accept="image/*" id="task-foto">
      </label>
      <div id="task-foto-preview" style="font-size:12.5px;color:var(--tinta-suave);"></div>
      <div class="row">
        <button type="button" class="btn btn-outline" id="task-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: sequência guiada (somente leitura) -->
<div class="modal-backdrop" id="preset-modal">
  <div class="modal">
    <h2 id="preset-modal-title" class="serif"></h2>
    <div id="preset-modal-content"></div>
    <button class="btn btn-outline" id="preset-modal-close" style="margin-top:16px;width:100%;">Fechar</button>
  </div>
</div>

<!-- Modal: nova data no calendário -->
<div class="modal-backdrop" id="cal-modal">
  <div class="modal">
    <h2>Nova data</h2>
    <form id="cal-form" class="task-form">
      <input type="date" id="cal-data" required>
      <input type="text" id="cal-evento" placeholder="Nome do evento / celebração" required>
      <select id="cal-cor" required>
        <option value="">Cor litúrgica</option>
        <option value="branco">Branco</option>
        <option value="vermelho">Vermelho</option>
        <option value="verde">Verde</option>
        <option value="roxo">Roxo</option>
        <option value="rosa">Rosa</option>
      </select>
      <div class="row">
        <button type="button" class="btn btn-outline" id="cal-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: novo vídeo -->
<div class="modal-backdrop" id="video-modal">
  <div class="modal">
    <h2>Novo vídeo</h2>
    <form id="video-form" class="task-form">
      <input type="text" id="video-titulo" placeholder="Título do vídeo" required>
      <input type="text" id="video-url" placeholder="Link do YouTube" required>
      <div class="row">
        <button type="button" class="btn btn-outline" id="video-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script>
/* =========================================================
   CONFIGURAÇÃO DO FIREBASE
   Substitua os valores abaixo pelos gerados no Console do
   Firebase (Configurações do projeto > seus apps > Web).
   Enquanto isso não for feito, o app funciona apenas
   localmente neste navegador (sem sincronizar entre celulares).
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyChop2sKKpfdb0i7y5r4IpxAKukV2nAHo8",
  authDomain: "mesce-nssaude.firebaseapp.com",
  projectId: "mesce-nssaude",
  storageBucket: "mesce-nssaude.firebasestorage.app",
  messagingSenderId: "691812255718",
  appId: "1:691812255718:web:268b049c3744d9fb3cf827"
};

let db = null;
let firebaseReady = false;

function initFirebase(){
  const statusEl = document.getElementById('sync-status');
  if (firebaseConfig.apiKey === "COLE_AQUI") {
    statusEl.style.display = 'block';
    statusEl.textContent = '⚠️ Firebase ainda não configurado — os dados ficam salvos apenas neste celular.';
    statusEl.classList.add('err');
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
    statusEl.style.display = 'block';
    statusEl.textContent = '✅ Sincronizado — as alterações aparecem nos dois celulares.';
    setTimeout(()=>{ statusEl.style.display='none'; }, 3500);
  }catch(e){
    statusEl.style.display = 'block';
    statusEl.classList.add('err');
    statusEl.textContent = '⚠️ Erro ao conectar ao Firebase. Verifique a configuração.';
    console.error(e);
  }
}
initFirebase();

/* ---------------------------------------------------------
   Armazenamento local de apoio (fallback quando Firebase
   ainda não está configurado)
--------------------------------------------------------- */
function localGet(key, fallback){
  try{ return JSON.parse(localStorage.getItem(key)) ?? fallback; }catch(e){ return fallback; }
}
function localSet(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

/* ---------------------------------------------------------
   Data de hoje no cabeçalho
--------------------------------------------------------- */
(function setToday(){
  const el = document.getElementById('today-label');
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  el.textContent = new Date().toLocaleDateString('pt-BR', opts);
})();

/* ---------------------------------------------------------
   Navegação entre abas
--------------------------------------------------------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

/* ---------------------------------------------------------
   Utilidades genéricas de coleção (Firestore ou localStorage)
--------------------------------------------------------- */
function watchCollection(name, orderField, cb){
  if (firebaseReady){
    db.collection(name).orderBy(orderField, 'desc').onSnapshot(snap=>{
      const items = [];
      snap.forEach(doc=> items.push({ ...doc.data(), id: doc.id }));
      cb(items);
    }, err=>{
      console.error(err);
      cb(localGet(name, []));
    });
  } else {
    cb(localGet(name, []).sort((a,b)=> (b[orderField]||0) - (a[orderField]||0)));
  }
}
function addToCollection(name, data){
  if (data.criadoEm === undefined) data.criadoEm = Date.now();
  if (firebaseReady){
    return db.collection(name).add(data);
  } else {
    const items = localGet(name, []);
    data.id = 'local-' + Date.now();
    items.push(data);
    localSet(name, items);
    watchers[name] && watchers[name]();
    return Promise.resolve();
  }
}
function updateInCollection(name, id, data){
  if (firebaseReady){
    return db.collection(name).doc(id).update(data);
  } else {
    const items = localGet(name, []);
    const idx = items.findIndex(i=>i.id===id);
    if (idx>-1) items[idx] = { ...items[idx], ...data };
    localSet(name, items);
    watchers[name] && watchers[name]();
    return Promise.resolve();
  }
}
function deleteFromCollection(name, id){
  if (firebaseReady){
    return db.collection(name).doc(id).delete();
  } else {
    let items = localGet(name, []);
    items = items.filter(i=>i.id!==id);
    localSet(name, items);
    watchers[name] && watchers[name]();
    return Promise.resolve();
  }
}
const watchers = {};

/* ===========================================================
   TAREFAS
=========================================================== */
let selectedPhoto = null;

document.getElementById('task-add-btn').addEventListener('click', ()=> document.getElementById('task-modal').classList.add('open'));
document.getElementById('task-cancel').addEventListener('click', ()=> document.getElementById('task-modal').classList.remove('open'));

document.getElementById('task-foto').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if (!file) { selectedPhoto = null; return; }
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      selectedPhoto = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById('task-foto-preview').textContent = '📎 foto anexada';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('task-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const titulo = document.getElementById('task-titulo').value.trim();
  const obs = document.getElementById('task-obs').value.trim();
  if (!titulo) return;
  addToCollection('tarefas', {
    titulo, observacao: obs, foto: selectedPhoto || null
  }).then(()=>{
    document.getElementById('task-form').reset();
    document.getElementById('task-foto-preview').textContent = '';
    selectedPhoto = null;
    document.getElementById('task-modal').classList.remove('open');
  });
});

/* ---- Sequências guiadas (apenas leitura, não geram itens na lista) ---- */
const presetCalice = [
  { titulo:'Higienização', obs:'Certifique-se de que o cálice e a patena estão limpos, sem manchas ou marcas de dedo.' },

function openPreset(titulo, steps){
  document.getElementById('preset-modal-title').textContent = titulo;
  document.getElementById('preset-modal-content').innerHTML =
    '<ol style="padding-left:20px;margin:0;">' +
    steps.map(s => `<li style="margin-bottom:12px;"><strong>${escapeHtml(s.titulo)}</strong>${s.obs ? `<br><span style="font-size:13.5px;color:var(--tinta-suave);">${escapeHtml(s.obs)}</span>` : ''}</li>`).join('') +
    '</ol>';
  document.getElementById('preset-modal').classList.add('open');
}
document.getElementById('preset-calice').addEventListener('click', ()=> openPreset('🍷 Preparação do Cálice', presetCalice));
document.getElementById('preset-consagracao').addEventListener('click', ()=> openPreset('⛪ Momento da Consagração', presetConsagracao));
document.getElementById('preset-modal-close').addEventListener('click', ()=> document.getElementById('preset-modal').classList.remove('open'));

function renderTasks(items){
  const list = document.getElementById('tasks-list');
  if (!items.length){
    list.innerHTML = '<div class="empty">Nenhuma anotação ainda. Toque em "+ Nova anotação" para criar a primeira ✝</div>';
    return;
  }
  list.innerHTML = items.map(t=>`
    <div class="card task-item" data-id="${t.id}">
      <div class="task-body" style="width:100%;">
        <p class="task-title">${escapeHtml(t.titulo)}</p>
        ${t.observacao ? `<p class="task-note">${escapeHtml(t.observacao)}</p>` : ''}
        ${t.foto ? `<img class="task-photo" src="${t.foto}" alt="Foto da anotação">` : ''}
        <div class="task-actions">
          <button data-action="delete">Excluir</button>
        </div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.task-item').forEach(el=>{
    const id = el.dataset.id;
    el.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
      if (confirm('Excluir esta anotação?')) deleteFromCollection('tarefas', id);
    });
  });
}
watchers['tarefas'] = ()=> watchCollection('tarefas', 'criadoEm', renderTasks);
watchers['tarefas']();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderGlossTabs(){
  const container = document.getElementById('gloss-tabs');
  container.innerHTML = Object.entries(glossario).map(([key, g], i)=>
    `<button data-key="${key}" class="${i===0 ? 'active':''}">${g.icon} ${g.label}</button>`
  ).join('');
  container.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      container.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('gloss-search').value = '';
      renderGlossItems(btn.dataset.key, '');
    });
  });
}
function renderGlossItems(key, query){
  const g = glossario[key];
  const q = query.trim().toLowerCase();
  const itens = g.itens
    .filter(it => !q || it.nome.toLowerCase().includes(q) || it.desc.toLowerCase().includes(q))
    .sort((a,b) => a.nome.localeCompare(b.nome, 'pt-BR'));
  const content = document.getElementById('gloss-content');
  if (!itens.length){
    content.innerHTML = '<div class="empty">Nenhum item encontrado.</div>';
    return;
  }
  content.innerHTML = itens.map(it=>`
    <div class="card gloss-item">
      ${it.img ? `<img class="foto" src="${it.img}" alt="Foto: ${it.nome}" loading="lazy">` : ''}
      ${it.cor
        ? `<h3><span class="color-dot" style="background:${it.cor}"></span>${it.nome}</h3>`
        : (it.img ? `<h3>${it.nome}</h3>` : `<div class="icon">${g.icon}</div><h3>${it.nome}</h3>`)
      }
      <p>${it.desc}</p>
    </div>
  `).join('');
}
function renderGlossSearchAllTabs(query){
  // busca em todas as seções ao mesmo tempo
  const q = query.trim().toLowerCase();
  const content = document.getElementById('gloss-content');
  let html = '';
  Object.values(glossario).forEach(g=>{
    const itens = g.itens
      .filter(it => it.nome.toLowerCase().includes(q) || it.desc.toLowerCase().includes(q))
      .sort((a,b) => a.nome.localeCompare(b.nome, 'pt-BR'));
    itens.forEach(it=>{
      html += `
        <div class="card gloss-item">
          ${it.img ? `<img class="foto" src="${it.img}" alt="Foto: ${it.nome}" loading="lazy">` : ''}
          ${it.cor
            ? `<h3><span class="color-dot" style="background:${it.cor}"></span>${it.nome} <span style="font-size:11px;color:var(--tinta-suave);">· ${g.label}</span></h3>`
            : (it.img ? `<h3>${it.nome} <span style="font-size:11px;color:var(--tinta-suave);">· ${g.label}</span></h3>` : `<div class="icon">${g.icon}</div><h3>${it.nome} <span style="font-size:11px;color:var(--tinta-suave);">· ${g.label}</span></h3>`)
          }
          <p>${it.desc}</p>
        </div>`;
    });
  });
  content.innerHTML = html || '<div class="empty">Nenhum item encontrado.</div>';
}
renderGlossTabs();
renderGlossItems('objetos', '');
document.getElementById('gloss-search').addEventListener('input', (e)=>{
  const q = e.target.value;
  if (q.trim()){
    renderGlossSearchAllTabs(q);
  } else {
    const activeKey = document.querySelector('#gloss-tabs button.active').dataset.key;
    renderGlossItems(activeKey, '');
  }
});

=========================================================== */
const corMap = { branco:'#ffffff', vermelho:'#8B1E2B', verde:'#2F5233', roxo:'#4B2E5C', rosa:'#C97B94', preto:'#2B2118' };
const meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

document.getElementById('cal-add-btn').addEventListener('click', ()=> document.getElementById('cal-modal').classList.add('open'));
document.getElementById('cal-cancel').addEventListener('click', ()=> document.getElementById('cal-modal').classList.remove('open'));

document.getElementById('cal-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const data = document.getElementById('cal-data').value;
  const evento = document.getElementById('cal-evento').value.trim();
  const cor = document.getElementById('cal-cor').value;
  if (!data || !evento || !cor) return;
  addToCollection('calendario', { data, evento, cor }).then(()=>{
    document.getElementById('cal-form').reset();
    document.getElementById('cal-modal').classList.remove('open');
  });
});

function renderCalendar(items){
  const list = document.getElementById('cal-list');
  if (!items.length){
    list.innerHTML = '<div class="empty">Nenhuma data cadastrada ainda. Toque em "+ Data" para adicionar.</div>';
    return;
  }
  const sorted = [...items].sort((a,b)=> new Date(a.data) - new Date(b.data));
  list.innerHTML = sorted.map(c=>{
    const d = new Date(c.data + 'T00:00:00');
    return `
    <div class="card cal-item" data-id="${c.id}">
      <div class="cal-date">
        <div class="d">${d.getDate()}</div>
        <div class="m">${meses[d.getMonth()]}</div>
      </div>
      <div class="cal-body">
        <h3><span class="color-dot" style="background:${corMap[c.cor]||'#ccc'}"></span>${escapeHtml(c.evento)}</h3>
        <p class="tag">Cor litúrgica: ${c.cor}</p>
      </div>
      <div class="task-actions"><button data-action="delete">Excluir</button></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.cal-item').forEach(el=>{
    el.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
      if (confirm('Excluir esta data?')) deleteFromCollection('calendario', el.dataset.id);
    });
  });
}
watchers['calendario'] = ()=> watchCollection('calendario', 'criadoEm', renderCalendar);
watchers['calendario']();

function extractYouTubeId(url){
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}

document.getElementById('video-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const titulo = document.getElementById('video-titulo').value.trim();
  const url = document.getElementById('video-url').value.trim();
  if (!titulo || !url) return;
  addToCollection('videos', { titulo, url }).then(()=>{
    document.getElementById('video-form').reset();
    document.getElementById('video-modal').classList.remove('open');
  });
});

function renderVideos(items){
  const list = document.getElementById('video-list');
  if (!items.length){
    list.innerHTML = '<div class="empty">Nenhum vídeo salvo ainda. Toque em "+ Link" para adicionar.</div>';
    return;
  }
  list.innerHTML = items.map(v=>{
    const yid = extractYouTubeId(v.url);
    const thumb = yid ? `https://img.youtube.com/vi/${yid}/hqdefault.jpg` : '';
    return `
    <div class="card video-item" data-id="${v.id}">
      ${thumb ? `<img class="video-thumb" src="${thumb}" alt="">` : '<div class="video-thumb"></div>'}
      <div style="flex:1;min-width:0;">
        <h3>${escapeHtml(v.titulo)}</h3>
        <a href="${v.url}" target="_blank" rel="noopener">Assistir no YouTube ↗</a>
      </div>
      <div class="task-actions"><button data-action="delete">Excluir</button></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.video-item').forEach(el=>{
    el.querySelector('[data-action="delete"]').addEventListener('click', ()=>{
      if (confirm('Excluir este vídeo?')) deleteFromCollection('videos', el.dataset.id);
    });
  });
}
watchers['videos'] = ()=> watchCollection('videos', 'criadoEm', renderVideos);
watchers['videos']();
